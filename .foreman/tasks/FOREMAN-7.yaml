    title: Questions decisions readiness
    spec: >
      Plan and implement the first post-v0 dogfood slice for Foreman dispatch readiness.


      Scope:

      - Add YAML-backed question and decision metadata for chunks.

      - Add minimal CLI commands to create/list/answer questions and record decisions.

      - Add a readiness validation command that reports whether a chunk is ready for future
      dispatch.

      - Keep the implementation testable between each step and avoid launching agents or creating
      run state in this slice.


      Expected outcome:

      - Foreman can represent human gates in its own task YAML without full dispatch runner
      behavior.

      - JSON and text outputs are stable enough for later automation.

      - Existing v0 task/chunk behavior continues to preserve unknown metadata.
