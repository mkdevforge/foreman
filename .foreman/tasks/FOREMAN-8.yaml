chunks:
  - id: sqlite-dispatch-schema
    title: SQLite dispatch schema
    spec: >
      Add the local SQLite persistence foundation for future dispatch runs.


      Scope:

      - Add database schema versions 2 and 3.

      - Add `dispatch_runs`, `dispatch_attempts`, and `dispatch_events` tables.

      - Preserve migration from existing schema version 1 databases.

      - Add low-level write helpers for runs, attempts, and events.

      - Add low-level query helpers for runs, attempts, and events.

      - Keep this slice below the CLI and runner layers: no command surface, no worktree creation,
      no Claude/Codex launch.


      Expected outcome:

      - Future dispatch commands have a tested local storage model before they create or launch
      runs.

      - Dispatch attempts can later link to captured sessions without changing existing
      `session_chunks` semantics.

      - Tests cover fresh schema creation, v1/v2 migration, constraints, cascades/nulling, and
      helper round-trips.
    status: done
    stage: review
    created_at: 2026-05-11T00:45:39.060Z
    updated_at: 2026-05-11T15:13:14.754Z
    notes:
      - ts: 2026-05-11T00:53:39.926Z
        body: "Implemented schema v2 dispatch persistence: dispatch_runs, dispatch_attempts,
          dispatch_events, low-level write/query helpers, v1 migration coverage, helper round-trip
          tests, and docs alignment. No runner, worktree creation, or dispatch CLI launch behavior
          added in this slice."
      - ts: 2026-05-11T01:40:18.808Z
        body: "Addressed review findings: added schema v3 triggers so dispatch events cannot point at
          attempts from another run, and changed dispatch status helpers so omitted optional fields
          preserve existing values while explicit null clears them. Added migration and helper
          regression coverage."
    dispatch:
      status: ready
      risk_level: low
      approval_required: none
      allowed_actions:
        - edit_source
        - run_tests
      blocked_actions:
        - launch_runner
  - id: dispatch-query-surface
    title: Dispatch query surface
    spec: >
      Add a user-facing read-only query surface for persisted dispatch runs after the SQLite
      persistence foundation lands.


      Scope:

      - Add commands to list and show dispatch runs.

      - Expose run, attempt, event, and linked session data in stable JSON.

      - Keep output useful for the future UI.

      - Do not launch agents or create worktrees in this slice.
    status: done
    stage: review
    created_at: 2026-05-11T00:45:43.076Z
    updated_at: 2026-05-11T17:38:06.281Z
    notes:
      - ts: 2026-05-11T15:19:24.797Z
        body: "Implemented read-only dispatch query surface: foreman dispatch list/show now expose persisted
          runs, attempts, events, and attempt-linked session overviews in stable JSON. Added CLI
          coverage, docs, and kept runner/worktree behavior out of scope."
    dispatch:
      status: ready
      risk_level: low
      approval_required: none
      allowed_actions:
        - edit_source
        - run_tests
      blocked_actions:
        - launch_runner
  - id: dispatch-create-command
    title: Dispatch create command
    spec: >
      Add the first write-side dispatch CLI surface by creating persisted queued dispatch runs
      without launching agents or creating worktrees.


      Scope:

      - Add `foreman dispatch create <task>/<chunk> [--stage <stage>]`.

      - Validate task/chunk existence through the control repo YAML.

      - Reuse chunk readiness evaluation and refuse to create runs for chunks that are not
      dispatch-ready.

      - Persist a `dispatch_runs` row with status `queued`, source `cli`, requested stage, and
      timestamps.

      - Persist an initial `dispatch_events` row of type `queued`.

      - Return stable JSON useful for the future UI.

      - Do not launch Claude/Codex, create worktrees, mutate chunk status, or create attempts in
      this slice.


      Expected outcome:

      - A ready chunk can be explicitly queued into local SQLite and then inspected through the
      existing dispatch list/show commands.

      - Not-ready chunks fail before any run rows are inserted, with actionable blockers in the
      error payload.
    status: done
    stage: review
    created_at: 2026-05-11T17:38:06.000Z
    updated_at: 2026-05-11T18:38:52.402Z
    notes:
      - ts: 2026-05-11T17:45:41.852Z
        body: "Implemented queued dispatch creation: foreman dispatch create now validates readiness,
          rejects discovery dispatch stages, atomically inserts a queued run plus queued event,
          returns UI-oriented JSON with readiness details, and leaves agent
          launch/worktrees/attempts out of scope. Verified with build, focused tests, full suite,
          and a real dogfood queued run."
    dispatch:
      status: ready
      risk_level: low
      approval_required: none
      allowed_actions:
        - edit_source
        - run_tests
      blocked_actions:
        - launch_runner
  - id: dispatch-cancel-command
    title: Dispatch cancel command
    spec: >
      Add the first dispatch run control command by allowing queued dispatch runs to be canceled
      before any runner or worktree exists.


      Scope:

      - Add `foreman dispatch cancel <run-id-or-prefix>`.

      - Resolve run IDs by exact ID or unique prefix.

      - Allow canceling runs in `queued` status.

      - Treat already-canceled runs as successful no-ops without appending duplicate events.

      - Update the run to `canceled`, set `updated_at` and `finished_at`, and append a run-level
      `canceled` event transactionally.

      - Return stable JSON with the updated dispatch run detail.

      - Do not launch agents, create worktrees, create attempts, or mutate task YAML in this slice.


      Expected outcome:

      - A queued dispatch run can be safely removed from future runner consideration while keeping
      an auditable local SQLite record.

      - Invalid status, missing ID, and ambiguous prefix failures are explicit and do not mutate
      rows.
    status: done
    stage: review
    created_at: 2026-05-11T18:38:52.402Z
    updated_at: 2026-05-11T18:52:06.472Z
    notes:
      - ts: 2026-05-11T18:42:46.012Z
        body: "Implemented queued dispatch cancellation: foreman dispatch cancel resolves exact IDs or
          unique prefixes, cancels queued runs transactionally with one canceled event, treats
          already-canceled runs as no-op success, rejects non-queued live/terminal statuses without
          mutation, and keeps runner/worktree/attempt behavior out of scope. Verified with build,
          focused tests, and dogfooding against the queued run from the previous slice."
    dispatch:
      status: ready
      risk_level: low
      approval_required: none
      allowed_actions:
        - edit_source
        - run_tests
      blocked_actions:
        - launch_runner
  - id: dispatch-claim-command
    title: Dispatch claim command
    spec: >
      Add a minimal runner-adjacent claim step for queued dispatch runs without creating attempts,
      worktrees, or launching agents.


      Scope:

      - Add `foreman dispatch claim <run-id-or-prefix> --tool <claude-code|codex>`.

      - Resolve run IDs by exact ID or unique prefix.

      - Allow claiming runs only in `queued` status.

      - Update the run to `claimed`, set `updated_at`, and append a run-level `claimed` event
      transactionally.

      - Store the selected tool in the claimed event data.

      - Return stable JSON with the updated dispatch run detail.

      - Do not create dispatch attempts, create worktrees, launch agents, mutate task YAML, or
      stop/cancel live work in this slice.


      Expected outcome:

      - A queued dispatch run can be moved out of the queue as a local runner preparation step while
      preserving an auditable event trail.

      - Invalid status, missing ID, ambiguous prefixes, and invalid tools are explicit and do not
      mutate rows.
    status: doing
    stage: review
    created_at: 2026-05-11T18:58:42.722Z
    updated_at: 2026-05-11T19:04:24.859Z
    notes:
      - ts: 2026-05-11T19:04:21.489Z
        body: "Implemented dispatch claim: foreman dispatch claim now validates claude-code/codex tools,
          resolves exact IDs or unique prefixes, transitions queued runs to claimed transactionally,
          records the selected tool in a claimed event, rejects non-queued runs without mutation,
          and keeps attempts/worktrees/agent launch out of scope. Verified with build, focused
          tests, full suite, and a real dogfood queued-to-claimed run."
    dispatch:
      status: ready
      risk_level: low
      approval_required: none
      allowed_actions:
        - edit_source
        - run_tests
      blocked_actions:
        - launch_runner
