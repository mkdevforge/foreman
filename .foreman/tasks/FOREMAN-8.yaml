          dispatch_events, low-level write/query helpers, v1 migration coverage, helper round-trip
          tests, and docs alignment. No runner, worktree creation, or dispatch CLI launch behavior
          added in this slice."
    dispatch:
      status: ready
      risk_level: low
      approval_required: none
      allowed_actions:
