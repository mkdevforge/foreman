chunks:
  - id: sqlite-dispatch-schema
    title: SQLite dispatch schema
    spec: >
      Add the local SQLite persistence foundation for future dispatch runs.


      Scope:

      - Add database schema versions 2 and 3.

      - Add `dispatch_runs`, `dispatch_attempts`, and `dispatch_events` tables.

      - Preserve migration from existing schema version 1 databases.

      - Add low-level write helpers for runs, attempts, and events.

      - Add low-level query helpers for runs, attempts, and events.

      - Keep this slice below the CLI and runner layers: no command surface, no worktree creation,
      no Claude/Codex launch.


      Expected outcome:

      - Future dispatch commands have a tested local storage model before they create or launch
      runs.

      - Dispatch attempts can later link to captured sessions without changing existing
      `session_chunks` semantics.

      - Tests cover fresh schema creation, v1/v2 migration, constraints, cascades/nulling, and
      helper round-trips.
    status: done
    stage: review
    created_at: 2026-05-11T00:45:39.060Z
    updated_at: 2026-05-11T15:13:14.754Z
    notes:
      - ts: 2026-05-11T00:53:39.926Z
        body: "Implemented schema v2 dispatch persistence: dispatch_runs, dispatch_attempts,
          dispatch_events, low-level write/query helpers, v1 migration coverage, helper round-trip
          tests, and docs alignment. No runner, worktree creation, or dispatch CLI launch behavior
          added in this slice."
      - ts: 2026-05-11T01:40:18.808Z
        body: "Addressed review findings: added schema v3 triggers so dispatch events cannot point at
          attempts from another run, and changed dispatch status helpers so omitted optional fields
          preserve existing values while explicit null clears them. Added migration and helper
          regression coverage."
    dispatch:
      status: ready
      risk_level: low
      approval_required: none
      allowed_actions:
        - edit_source
        - run_tests
      blocked_actions:
        - launch_runner
  - id: dispatch-query-surface
    title: Dispatch query surface
    spec: >
      Add a user-facing read-only query surface for persisted dispatch runs after the SQLite
      persistence foundation lands.


      Scope:

      - Add commands to list and show dispatch runs.

      - Expose run, attempt, event, and linked session data in stable JSON.

      - Keep output useful for the future UI.

      - Do not launch agents or create worktrees in this slice.
    status: review
    stage: review
    created_at: 2026-05-11T00:45:43.076Z
    updated_at: 2026-05-11T15:19:35.068Z
    notes:
      - ts: 2026-05-11T15:19:24.797Z
        body: "Implemented read-only dispatch query surface: foreman dispatch list/show now expose persisted
          runs, attempts, events, and attempt-linked session overviews in stable JSON. Added CLI
          coverage, docs, and kept runner/worktree behavior out of scope."
