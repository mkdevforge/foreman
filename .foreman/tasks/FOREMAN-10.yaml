chunks:
  - id: dispatch-prompt-preview
    title: Dispatch prompt preview
    spec: |
      Add a deterministic prompt preview command for prepared dispatch attempts before launching
      Claude Code or Codex.

      Scope:
      - Add `foreman dispatch prompt <run-id-or-prefix>`.
      - Resolve run IDs by exact ID or unique prefix.
      - Require `remote.origin.url` and verify the run `repo_name` matches the current control repo.
      - Require a prepared/running run with exactly one attempt and a non-null workspace path.
      - Load task/chunk YAML from the control repo and include the task, chunk spec, status, stage,
        requested dispatch stage, dispatch readiness policy, questions, decisions, run id, attempt id,
        selected tool, workspace path, worktree branch, and repo name.
      - Include explicit instructions that unresolved ambiguity should produce Foreman questions instead
        of guesses.
      - Return stable JSON containing prompt metadata and the prompt text, plus plain text output that is
        directly usable as a launch prompt.
      - Do not launch Claude/Codex, mutate SQLite, mutate task YAML, attach sessions, or clean up worktrees
        in this slice.

      Expected outcome:
      - Prepared dispatch attempts have a reviewable, deterministic prompt artifact.
      - The future launch command can consume the same prompt builder without inventing prompt context at
        process-launch time.
      - Invalid statuses, missing attempts, multiple attempts, missing workspace paths, repo mismatches,
        missing task/chunk YAML, and ambiguous prefixes fail explicitly without side effects.
    status: done
    stage: review
    created_at: 2026-05-12T01:03:26.961Z
    updated_at: 2026-05-12T01:27:24.686Z
    notes:
      - ts: 2026-05-12T01:09:14.841Z
        body: "Implemented dispatch prompt preview: foreman dispatch prompt now verifies repo_name, requires
