          from repo YAML, and emits deterministic text plus JSON metadata without DB or YAML
          mutation. Verified with build, focused tests, JSON-envelope acceptance coverage, and a
          real prompt preview against the prepared FOREMAN-9 dogfood run."
    dispatch:
