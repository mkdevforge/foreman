chunks:
  - id: dispatch-reconcile-command
    title: Dispatch reconcile command
    spec: |
      Add an explicit recovery command for stale local dispatch rows that were abandoned by
      earlier runner slices, process exits, or interrupted dogfood flows.

      Scope:
      - Add `foreman dispatch reconcile <run-id-or-prefix>` with text and JSON output.
      - Add `foreman dispatch reconcile --all` for batch reconciliation.
      - Resolve run IDs by exact ID or unique prefix.
      - Require `remote.origin.url` on the control repo and verify each run `repo_name`
        matches the current repo when `repo_name` is present.
      - Detect stale `claimed` runs with no attempts.
      - Detect stale `running` runs with a `preparing_workspace` attempt and no launched
        process.
      - Detect stale `running` runs with a `launching_agent` attempt whose recorded
        `process_id` is no longer alive and no Stop-hook session was attached.
      - Mark unrecoverable stale runs as `failed`, set terminal timestamps, and append a
        reconciliation event with the previous status, attempt status, process id, and reason.
      - Use a conservative `--older-than <duration>` threshold, defaulting to 24h.
      - Make reruns idempotent for already-terminal rows.
      - Dogfood against the existing stale local runs from earlier dispatch slices.
      - Do not retry, relaunch, merge, cleanup worktrees, infer success, mutate task YAML, or
        harden Git/SQLite partial side effects in this chunk.

      Expected outcome:
      - Old local dispatch rows no longer stay permanently `claimed` or `running` after the
        underlying process or preparation step is gone.
      - Humans and the future UI get explicit terminal failure records instead of ambiguous
        abandoned run state.
    status: todo
    stage: plan
