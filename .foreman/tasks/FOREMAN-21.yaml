chunks:
  - id: dispatch-side-effect-recovery
    title: Dispatch side-effect recovery
    spec: |
      Harden dispatch operations that currently span Git side effects and SQLite audit events.

      Problem:
      - `foreman dispatch merge` fast-forwards Git before recording the `merged` event.
      - `foreman dispatch cleanup` removes the worktree before recording the `cleaned_up` event.
      - If SQLite writes fail after Git succeeds, local filesystem/history state can change without
        a corresponding dispatch audit event.

      Scope:
      - Review merge and cleanup as cross-resource operations and define a minimal recovery model.
      - Preserve the local single-user CLI stance; do not introduce distributed transactions or a
        daemon requirement.
      - Prefer idempotent, durable operation markers or reconciliation data that can explain and
        repair "Git succeeded, SQLite event missing" cases.
      - Add tests that inject failures around the Git/SQLite boundary for both merge and cleanup.
      - Ensure rerunning merge or cleanup after a partial failure produces a clear result and does
        not double-apply destructive Git operations.
      - Update README and dispatch run model docs with the recovery/audit behavior.
      - Do not add push, retry, relaunch, remote synchronization, or general stale-run reconciliation
        behavior in this chunk.

      Expected outcome:
      - Dispatch merge and cleanup have an explicit, tested recovery story for partial local failures.
      - A future UI can distinguish normal completion, already-applied side effects, and recovered
        audit records from regular command failures.
    status: done
    stage: implement
    created_at: 2026-05-16T00:00:00.000Z
    updated_at: 2026-05-17T01:10:33.567Z
    notes:
      - ts: 2026-05-17T01:10:24.578Z
        body: Implemented durable merge_started/cleanup_started intent markers plus rerun recovery for
          missing merged/cleaned_up audit events after local Git side effects. Added
          failure-injection tests for merge and cleanup and documented audit_recovered JSON
          behavior.
