chunks:
  - id: dispatch-start-command
    title: Dispatch start command
    spec: |
      Add a composed dispatch command for the normal human/UI flow.

      Scope:
      - Add `foreman dispatch start <task>/<chunk> --tool <claude-code|codex>
        [--stage <stage>]`.
      - Reuse existing readiness, create, claim, prepare, prompt, and launch primitives.
      - Validate `--stage` the same way as `dispatch create`; `discovery` remains invalid.
      - Persist the same queued, claimed, attempt_prepared, prompt_built, and agent_launched
        event sequence as the lower-level commands.
      - Return stable JSON containing `dispatch_run`, `readiness`, `workspace`,
        `dispatch_launch`, and a concise `steps` array for UI use.
      - Stop on the first failure while preserving already-recorded dispatch state.
      - Do not wait for completion, infer success, attach sessions, retry, merge, clean up
        worktrees, or mutate task YAML.

      Expected outcome:
      - A ready chunk can be launched with one command while preserving the lower-level audit
        trail and recovery commands.
      - Not-ready chunks fail before any dispatch rows are inserted.
      - Missing agent binaries leave the created run prepared/running without launching a process,
        matching the lower-level launch behavior.
    status: done
    stage: implement
    created_at: 2026-05-14T19:05:47.427Z
    updated_at: 2026-05-14T19:12:01.239Z
    notes:
      - ts: 2026-05-14T19:12:01.184Z
        body: Implemented dispatch start as the composed create, claim, prepare, prompt, and launch path. It
          preserves the existing event sequence, returns readiness/workspace/launch/steps for UI
          use, rejects not-ready chunks before inserting rows, and includes completed steps plus
          dispatch run state for preparation failures. Verified build, focused tests, JSON-envelope
          coverage, and full suite.
